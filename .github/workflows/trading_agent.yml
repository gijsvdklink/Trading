name: Morning Trading Email

on:
  schedule:
    # 7:30 CET every weekday morning
    # Summer (CEST = UTC+2): 06:30 UTC = 08:30 local
    # Winter (CET  = UTC+1): 06:30 UTC = 07:30 local
    - cron: '30 6 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  morning-email:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code (includes portfolio_state.json)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: models/
          key: model-${{ hashFiles('src/model.py', 'src/features.py') }}
          restore-keys: model-

      - name: Train model if missing
        run: |
          if [ ! -f models/model_latest.joblib ]; then
            echo "Model not found — training now..."
            python train.py --universe sp500 --skip-backtest
          else
            echo "Model found."
          fi

      - name: Send morning email
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          BUDGET_EUR:      ${{ secrets.BUDGET_EUR }}
          HOLDING_DAYS:    '5'
          STOP_LOSS_PCT:   '0.05'
        run: python morning_email.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-email-${{ github.run_id }}
          path: logs/
          retention-days: 14
